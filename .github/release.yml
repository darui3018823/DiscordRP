changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
      - invalid
      - wontfix
    authors:
      - dependabot
  categories:
    - title: "🚨 Breaking Changes"
      labels:
        - breaking-change
        - breaking

    - title: "🎉 New Features"
      labels:
        - feature
        - enhancement

    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - bugfix
        - fix

    - title: "Other Changes"
      labels:
        - "*"
